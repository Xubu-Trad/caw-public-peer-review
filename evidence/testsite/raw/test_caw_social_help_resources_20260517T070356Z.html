<!doctype html>
<html lang="en" translate="no" class="notranslate" style="background-color: #0A0A0A; color-scheme: dark">
  <head>
    <meta charset="UTF-8" />
    <!--
      Disable browser-level page translation (Chrome / Edge / Safari).
      Chrome's translator mutates DOM text nodes inside React-owned
      elements, breaking input handling and causing posts/typing to
      silently fail. Our own per-post translation (Settings → Language
      + the inline Translate button) is the supported path.
    -->
    <meta name="google" content="notranslate" />
    <!--
      Favicons + add-to-home-screen icons. Without the apple-touch-icon
      link, iOS scrapes the page for the largest image it can find and
      falls back to a screenshot of the 16/32px favicon — pixelated and
      cropped. Same story on Android without the manifest. Files live in
      /public/favicon and ship as static assets.
    -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon/favicon-16x16.png" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#0A0A0A" />
    <meta name="apple-mobile-web-app-title" content="CAW" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <meta
      name="description"
      content=""
    />
    <!--
      viewport-fit=cover makes env(safe-area-inset-*) emit real values on
      iOS Safari + PWA mode (apple-mobile-web-app-status-bar-style is
      black-translucent below, which extends the viewport behind the
      status bar — without viewport-fit=cover the inset variables stay
      at 0 and the mobile header renders with the page background
      showing through the status-bar strip above it).

      interactive-widget=resizes-content tells iOS 16.4+/Chrome 108+ to
      shrink the layout viewport when the keyboard opens, so a
      position: fixed; bottom: 0 element (e.g. the inline-compose Post
      toolbar) sits above the keyboard instead of being covered by it.
      Older browsers ignore the unknown token.
    -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />
    <title>CAW — Decentralized &amp; Censorship Resistant</title>

    <!--
      Default Open Graph + Twitter card. Crawlers (Twitter, Slack,
      Discord, iMessage, Facebook, etc.) get per-URL versions of these
      injected by the API's spaPrerender route — see
      client/src/api/util/spaPrerender.ts. These static defaults are the
      fallback for crawlers whose UA we don't catch and for the homepage
      itself. Description is intentionally empty: the OG image already
      carries the per-page detail (handle, bio, post body, etc.), and
      the text below the card was just duplicating it.
      The __CAW_PUBLIC_URL__ sentinel is replaced by the operator's
      domain during `caw install` (cli/src/steps/install.js).
    -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="CAW — Decentralized &amp; Censorship Resistant" />
    <meta property="og:description" content="" />
    <meta property="og:url" content="__CAW_PUBLIC_URL__" />
    <meta property="og:image" content="__CAW_PUBLIC_URL__/api/og/image/default" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="CAW" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="CAW — Decentralized &amp; Censorship Resistant" />
    <meta name="twitter:description" content="" />
    <meta name="twitter:image" content="__CAW_PUBLIC_URL__/api/og/image/default" />

  <body style="background-color: #0A0A0A; color-scheme: dark; margin: 0">
    <div id="theme-bg" style="position: fixed; inset: 0; z-index: 0; background-color: #0A0A0A"></div>
    <div id="root" style="position: relative; z-index: 1"></div>
    <script>
      try {
        var t = JSON.parse(localStorage.getItem('theme-storage') || '{}');
        if (t.state && t.state.isDark === false) {
          document.getElementById('theme-bg').style.backgroundColor = '#f3f4f6';
          document.documentElement.style.backgroundColor = '#f3f4f6';
          document.documentElement.style.colorScheme = 'light';
          document.body.style.backgroundColor = '#f3f4f6';
          document.body.style.colorScheme = 'light';
        }
      } catch(e) {}
    </script>
